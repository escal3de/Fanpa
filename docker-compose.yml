services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    container_name: fanpa-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fanpa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - fanpa-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fanpa-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Fanpa.API/Dockerfile
    container_name: fanpa-api
    depends_on:
      - postgres
      - redis
    ports:
      - "5049:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DbConnection: Host=postgres;Port=5432;Database=fanpa;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379

volumes:
  fanpa-postgres-data:
